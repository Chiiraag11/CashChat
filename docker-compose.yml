version: '3.9'

# Local development stack. In production, DATABASE_URL points at AWS RDS
# Postgres and Redis is Upstash (HTTP-based, no container needed) — see
# README "Deployment" section.
services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3000:3000'
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://finchat:finchat@db:5432/finchat?schema=public
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: finchat
      POSTGRES_PASSWORD: finchat
      POSTGRES_DB: finchat
    volumes:
      - finchat_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U finchat']
      interval: 5s
      timeout: 5s
      retries: 10

  # Local Redis for development only — Upstash's REST client also works
  # against this if you point UPSTASH_REDIS_REST_URL at a small REST proxy,
  # but most contributors will just run `npm run dev` against a real
  # Upstash free-tier database instead. Included here for completeness /
  # offline development.
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

volumes:
  finchat_pgdata:
